<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Customer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:#020b2d;
    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:50px 50px;
    font-family:Arial, Helvetica, sans-serif;
}

</style>

</head>

<body class="text-white min-h-screen">


<nav class="flex items-center justify-between px-8 py-5 border-b border-white/10">

    <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-r from-cyan-400 to-blue-600 flex items-center justify-center text-2xl">
            🛡
        </div>

        <h1 class="text-3xl font-bold">SecureBank</h1>
    </div>

    <a href="/allCustomer" class="text-gray-400 hover:text-white text-xl">
        Back to Customers
    </a>

</nav>


<div class="flex justify-center mt-16">

<div class="w-full max-w-3xl bg-white/5 border border-white/10 rounded-3xl p-12">

    <h1 class="text-5xl font-bold mb-3">
        👥 Add New Customer
    </h1>

    <p class="text-gray-400 text-xl mb-10">
        Enter the new customer details below
    </p>

    <form th:object="${customer}" action="/saveCustomer" method="post">

        <div class="mb-8">

            <label class="block text-xl mb-3">
                Customer Name
            </label>

            <input type="text"
                   th:field="*{name}"
                   placeholder="Enter customer name"
                   class="w-full p-5 rounded-2xl bg-slate-800 border border-white/10 text-white text-xl outline-none">

        </div>

        <div class="mb-8">

            <label class="block text-xl mb-3">
                Address
            </label>

            <input type="text"
                   th:field="*{address}"
                   placeholder="Enter address"
                   class="w-full p-5 rounded-2xl bg-slate-800 border border-white/10 text-white text-xl outline-none">

        </div>

        <div class="mb-8">

            <label class="block text-xl mb-3">
                Age
            </label>

            <input type="number"
                   th:field="*{age}"
                   placeholder="Enter age"
                   class="w-full p-5 rounded-2xl bg-slate-800 border border-white/10 text-white text-xl outline-none">

        </div>

        <div class="mb-8">

            <label class="block text-xl mb-3">
                Choose the Bank
            </label>

            <select th:field="*{bank.id}"
                    class="w-full p-5 rounded-2xl bg-slate-800 border border-white/10 text-white text-xl outline-none">

                <option value="">Select a bank</option>

                <option th:each="bank:${saraBank}"
                        th:value="${bank.id}"
                        th:text="${bank.name}">
                </option>

            </select>

        </div>

        <div class="mb-10">

            <label class="block text-xl mb-3">
                Select User
            </label>

            <select th:field="*{user.id}"
                    class="w-full p-5 rounded-2xl bg-slate-800 border border-white/10 text-white text-xl outline-none">

                <option value="">-- Select User --</option>

                <option th:each="u : ${users}"
                        th:value="${u.id}"
                        th:text="${u.username}">
                </option>

            </select>

        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-400 to-cyan-500 py-5 rounded-2xl text-2xl font-semibold hover:scale-[1.02] transition">

            💾 Save Customer

        </button>

    </form>

</div>

</div>

</body>
</html>
