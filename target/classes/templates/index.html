<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banking Customer System</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .fade-in {
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body class="bg-gradient-to-r from-indigo-900 via-blue-800 to-indigo-900 min-h-screen text-white flex flex-col justify-center items-center">

    <!-- MAIN CARD -->
    <div class="fade-in bg-white bg-opacity-10 backdrop-blur-lg p-10 rounded-2xl shadow-2xl text-center max-w-xl">

        <h1 class="text-4xl font-bold mb-4">🏦 Secure Bank System</h1>

        <h3 class="text-lg text-gray-200 mb-2">
            Modern Banking Built for Speed & Simplicity
        </h3>

        <p class="text-gray-300 mb-6">
            Manage customers, banks, and accounts securely with role-based access.
        </p>

        <!-- BUTTONS -->
        <div class="flex justify-center gap-4">
            <a href="/login">
                <button class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-lg transition">
                    Login
                </button>
            </a>

            <a href="/register">
                <button class="bg-green-500 hover:bg-green-600 px-6 py-2 rounded-lg transition">
                    Register
                </button>
            </a>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="mt-10 text-gray-400 text-sm">
        © 2026 Banking System | Built with ❤️
    </div>

</body>
</html>
