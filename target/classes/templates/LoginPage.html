<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBank Login</title>


<script src="https://cdn.tailwindcss.com"></script>

<style>


body{
    background-color: #020b2d;
    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    font-family: Arial, Helvetica, sans-serif;
}

.glow{
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,140,255,0.35), transparent 70%);
    filter: blur(60px);
    z-index: 0;
}


.fade-in{
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform: translateY(20px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden">


<div class="glow top-32 left-1/2 -translate-x-1/2"></div>

   
 
      <div class="absolute top-8 left-10 flex items-center gap-4 z-50">

        <div class="w-10 h-10 rounded-2xl bg-gradient-to-r from-cyan-400 to-blue-600 flex items-center justify-center text-2xl shadow-xl">
            🛡
        </div>

        <h1 class="text-3xl font-bold text-white">
          SecureBank
        </h1>

    </div>


<div class="relative z-10 w-full max-w-md fade-in mt-20">


    <div class="text-center mb-5">

        <h2 class="text-4xl font-bold text-white mb-4">
            Welcome back
        </h2>

        <p class="text-gray-400 text-lg">
            Sign in to access your banking dashboard
        </p>

    </div>

    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-3xl p-10 shadow-2xl">

        <p class="text-green-400 text-center mb-4 font-semibold"
           th:text="${msg}">
        </p>

        <p class="text-red-400 text-center mb-4 font-semibold"
           th:text="${error}">
        </p>

        <form action="/login" method="post" class="space-y-7">

            <div>

                <label class="block text-gray-300 mb-3 text-lg font-medium">
                    Username
                </label>

                <input type="text"
                       name="username"
                       placeholder="Enter your username"
                       required

                       class="w-full bg-[#172544] border border-gray-700 text-white px-5 py-4 rounded-2xl outline-none focus:ring-2 focus:ring-cyan-400 transition placeholder:text-gray-500">

            </div>


            <div>

                <label class="block text-gray-300 mb-3 text-lg font-medium">
                    Password
                </label>

                <input type="password"
                       name="password"
                       placeholder="Enter your password"
                       required

                       class="w-full bg-[#172544] border border-gray-700 text-white px-5 py-4 rounded-2xl outline-none focus:ring-2 focus:ring-cyan-400 transition placeholder:text-gray-500">

            </div>

            <button type="submit"

                    class="w-full bg-gradient-to-r from-cyan-400 to-blue-600 hover:scale-[1.02] transition-all duration-300 py-4 rounded-2xl text-xl font-semibold text-white shadow-2xl shadow-cyan-500/30">

                Sign In →

            </button>

        </form>


        <p class="text-center text-gray-400 mt-8 text-lg">

            Don’t have an account?

            <a href="/register"
               class="text-cyan-400 hover:text-cyan-300 font-semibold">
                Register
            </a>

        </p>

    </div>


    <div class="text-center mt-2">

        <a href="/"
           class="text-gray-400 hover:text-white transition text-m">
            ← Back to homepage
        </a>

    </div>

</div>

</body>
</html>
